name: Deploy to Server

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-to-server
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy (build as deployer, restart via sudo -n)
        shell: bash
        run: |
          set -euo pipefail

          ssh -o BatchMode=yes -o ConnectTimeout=20 "${SSH_USER}@${SSH_HOST}" 'bash -se' <<'EOF'
          set -euo pipefail

          # ===== CONFIG =====
          DEPLOY_USER="deployer"
          REPO_DIR="/home/v0-ai-solutions-website-l6"
          RELEASE_DIR="/opt/ai-solutions"
          REPO_URL="https://github.com/Alan573660/v0-ai-solutions-website-l6.git"

          # exact paths (match sudoers / avoid PATH issues)
          SYSTEMCTL="/usr/bin/systemctl"
          RSYNC="/usr/bin/rsync"
          MKDIR="/usr/bin/mkdir"
          CHOWN="/usr/bin/chown"
          CHMOD="/usr/bin/chmod"
          RM="/usr/bin/rm"

          echo "[0/9] Context"
          whoami
          hostname
          echo "systemctl=$(command -v systemctl || true)"
          node -v || true
          pnpm -v || true
          echo "REPO_DIR=$REPO_DIR"
          echo "RELEASE_DIR=$RELEASE_DIR"

          echo "[1/9] Ensure repo dir exists & owned by deployer"
          sudo -n "$MKDIR" -p "$REPO_DIR"
          sudo -n "$CHOWN" -R "${DEPLOY_USER}:${DEPLOY_USER}" "$REPO_DIR"

          echo "[2/9] Ensure repo is marked safe"
          sudo -u "$DEPLOY_USER" -H bash -lc "git config --global --add safe.directory '$REPO_DIR' || true"

          echo "[3/9] Ensure repo exists (repair if needed)"
          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "Repo missing/corrupted: recreating via sudo -n rm + clone"
            sudo -n "$RM" -rf "$REPO_DIR"
            sudo -n "$MKDIR" -p "$REPO_DIR"
            sudo -n "$CHOWN" -R "${DEPLOY_USER}:${DEPLOY_USER}" "$REPO_DIR"
            sudo -u "$DEPLOY_USER" -H git clone --depth 1 "$REPO_URL" "$REPO_DIR"
          fi

          echo "[4/9] Update repo to origin/main (as deployer)"
          sudo -u "$DEPLOY_USER" -H bash -lc "
            set -euo pipefail
            cd '$REPO_DIR'
            git fetch origin main --depth 1
            git reset --hard origin/main
          "

          echo "[5/9] Install deps (as deployer, non-interactive)"
          sudo -u "$DEPLOY_USER" -H bash -lc "
            set -euo pipefail
            export CI=1
            cd '$REPO_DIR'
            # IMPORTANT: avoid permission issues from old installs
            rm -rf node_modules
            pnpm install --frozen-lockfile --prefer-offline
          "

          echo "[6/9] Build (as deployer)"
          sudo -u "$DEPLOY_USER" -H bash -lc "
            set -euo pipefail
            cd '$REPO_DIR'
            pnpm build
          "

          echo "[7/9] Sync standalone runtime to $RELEASE_DIR (sudo -n)"
          sudo -n "$MKDIR" -p "$RELEASE_DIR/.next"
          sudo -n "$RSYNC" -a --delete "$REPO_DIR/.next/standalone/" "$RELEASE_DIR/"
          sudo -n "$RSYNC" -a --delete "$REPO_DIR/.next/static/" "$RELEASE_DIR/.next/static/"
          sudo -n "$RSYNC" -a --delete "$REPO_DIR/public/" "$RELEASE_DIR/public/"
          sudo -n "$CHOWN" -R root:root "$RELEASE_DIR"
          sudo -n "$CHMOD" -R a+rX "$RELEASE_DIR"

          echo "[8/9] Restart service (sudo -n)"
          sudo -n "$SYSTEMCTL" restart ai-solutions

          echo "[9/9] Status"
          sudo -n "$SYSTEMCTL" status ai-solutions --no-pager -l || true
          sudo -n "$SYSTEMCTL" is-active ai-solutions --quiet && echo "Service: ACTIVE" || (echo "Service: NOT ACTIVE" && exit 1)

          echo "DONE"
          EOF
