name: Deploy to Server

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-to-server
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Test SSH connectivity
        shell: bash
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o ConnectTimeout=20 "${SSH_USER}@${SSH_HOST}" \
            "echo SSH OK; whoami; hostname; uname -a"

      - name: Remote deploy (Next.js standalone -> /opt/ai-solutions)
        shell: bash
        run: |
          set -euo pipefail
          ssh -o BatchMode=yes -o ConnectTimeout=20 "${SSH_USER}@${SSH_HOST}" 'bash -se' <<'EOF'
          set -euo pipefail
          export CI=1

          REPO_DIR="/home/v0-ai-solutions-website-l6"
          RELEASE_DIR="/opt/ai-solutions"

          echo "[0/8] Context"
          whoami
          hostname
          command -v node >/dev/null && node -v || true
          command -v pnpm >/dev/null && pnpm -v || true
          echo "REPO_DIR=$REPO_DIR"
          echo "RELEASE_DIR=$RELEASE_DIR"

          echo "[1/8] Ensure repo exists"
          if [ ! -d "$REPO_DIR/.git" ]; then
            rm -rf "$REPO_DIR"
            git clone --depth 1 https://github.com/Alan573660/v0-ai-solutions-website-l6.git "$REPO_DIR"
          fi

          echo "[2/8] Mark repo as safe (avoid dubious ownership)"
          git config --global --add safe.directory "$REPO_DIR" || true

          echo "[3/8] Update repo to origin/main"
          cd "$REPO_DIR"
          git fetch origin main --depth 1
          git reset --hard origin/main

          echo "[4/8] Install deps (non-interactive)"
          rm -rf node_modules
          pnpm install --frozen-lockfile --prefer-offline

          echo "[5/8] Build"
          pnpm build

          echo "[6/8] Sync standalone runtime to $RELEASE_DIR"
          sudo -n /bin/mkdir -p "$RELEASE_DIR/.next"
          sudo -n /usr/bin/rsync -a --delete .next/standalone/ "$RELEASE_DIR/"
          sudo -n /usr/bin/rsync -a --delete .next/static/ "$RELEASE_DIR/.next/static/"
          sudo -n /usr/bin/rsync -a --delete public/ "$RELEASE_DIR/public/"

          echo "[7/8] Restart service"
          sudo -n /bin/systemctl restart ai-solutions

          echo "[8/8] Status + quick health checks"
          sudo -n /bin/systemctl status ai-solutions --no-pager -l || true
          sudo -n /bin/systemctl is-active ai-solutions --quiet && echo "Service: ACTIVE" || (echo "Service: NOT ACTIVE" && exit 1)

          # Port check (optional, but handy)
          if command -v ss >/dev/null; then
            ss -lntp | grep ':3000' || true
          fi

          # Health endpoint (if exists) - won't fail the deploy
          curl -fsS "http://127.0.0.1:3000/api/health" >/dev/null 2>&1 && echo "Health: OK" || echo "Health: (no /api/health or not ready yet)"

          echo "DONE"
          EOF
