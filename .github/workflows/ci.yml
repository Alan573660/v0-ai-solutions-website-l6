name: Deploy to Server

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH connectivity
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=20 "${SSH_USER}@${SSH_HOST}" \
            "echo SSH OK; whoami; hostname; uname -a"

      - name: Remote deploy (Next.js standalone -> /opt/ai-solutions)
        run: |
          ssh -o BatchMode=yes -o ConnectTimeout=20 "${SSH_USER}@${SSH_HOST}" 'bash -se' <<'EOF'
          set -euo pipefail

          REPO_DIR="/home/v0-ai-solutions-website-l6"
          RELEASE_DIR="/opt/ai-solutions"

          echo "[1/6] Ensure repo exists"
          if [ ! -d "$REPO_DIR/.git" ]; then
            rm -rf "$REPO_DIR"
            git clone https://github.com/Alan573660/v0-ai-solutions-website-l6.git "$REPO_DIR"
          fi

          echo "[2/6] Update repo to origin/main"
          cd "$REPO_DIR"
          git fetch origin
          git reset --hard origin/main

          echo "[3/6] Install deps"
          pnpm install --frozen-lockfile

          echo "[4/6] Build"
          pnpm build

          echo "[5/6] Sync standalone runtime to $RELEASE_DIR"
          sudo mkdir -p "$RELEASE_DIR"
          sudo rsync -a --delete .next/standalone/ "$RELEASE_DIR/"
          sudo rsync -a --delete .next/static/ "$RELEASE_DIR/.next/static/"
          sudo rsync -a --delete public/ "$RELEASE_DIR/public/"

          sudo chown -R root:root "$RELEASE_DIR"
          sudo chmod -R a+rX "$RELEASE_DIR"

          echo "[6/6] Restart service"
          sudo systemctl restart ai-solutions
          sudo systemctl status ai-solutions --no-pager -l

          echo "DONE"
          EOF
