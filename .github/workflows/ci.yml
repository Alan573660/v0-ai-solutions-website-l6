name: Deploy to Server

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Write SSH config
        run: |
          install -m 700 -d ~/.ssh
          {
            echo "Host target"
            echo "  HostName ${SSH_HOST}"
            echo "  User ${SSH_USER}"
            echo "  StrictHostKeyChecking no"
          } >> ~/.ssh/config

      - name: Test SSH connectivity
        run: |
          ssh -tt target "echo SSH OK; whoami; uname -a"

      - name: Remote deploy
        run: |
          ssh -tt target << 'EOF'
          set -euo pipefail

          APP_DIR="/home/v0-ai-solutions-website-l6"
          PROJECT_NAME="v0-ai-solutions-website-l6"

          echo "[1/5] Stop stack"
          docker compose -p "$PROJECT_NAME" down --remove-orphans || true

          echo "[2/5] Cleanup"
          docker image prune -a -f || true
          docker builder prune -a -f || true

          echo "[3/5] Refresh repo"
          rm -rf "$APP_DIR"
          cd /home
          git clone https://github.com/Alan573660/v0-ai-solutions-website-l6.git
          cd "$APP_DIR"

          echo "[4/5] Build & run"
          docker compose up -d --build --pull always

          echo "[5/5] Done"
          docker ps
          EOF
